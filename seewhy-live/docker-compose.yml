version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: seewhy
      POSTGRES_USER: seewhy
      POSTGRES_PASSWORD: ${DB_PASSWORD:-seewhy_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seewhy"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Cache / Pub-Sub ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── FastAPI + Socket.IO backend ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://seewhy:${DB_PASSWORD:-seewhy_dev}@postgres:5432/seewhy
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging

  # ── React SPA (nginx serving built assets) ───────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    logging: *default-logging

  # ── RTMP ingest → HLS output ────────────────────────────────────────────────
  rtmp:
    image: tiangolo/nginx-rtmp
    restart: unless-stopped
    ports:
      - "1935:1935"   # RTMP ingest (OBS, Streamlabs, etc.)
      - "8080:8080"   # HLS playback HTTP
    volumes:
      - ./infrastructure/nginx/nginx-rtmp.conf:/etc/nginx/nginx.conf:ro
      - rtmp_hls:/tmp/hls
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  rtmp_hls:

networks:
  default:
    name: seewhy-network
